services:
  frontend:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./frontend/index.html:/usr/share/nginx/html/index.html:ro
    depends_on:
      - backend
    restart: always
    networks:
      - student-net

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    command: sh -c "python /app/wait_for_db.py && flask --app app run --host=0.0.0.0 --port=5000"
    env_file:
     - .env
    volumes:
      - ./backend:/app #binf mount
    depends_on:
      - db
    restart: always
    networks:
      - student-net

  

volumes:
  recipes_db_data:

networks:
  student-net:
    driver: bridge
