<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Recipe Organizer</title>
  <style>
    body {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: auto 1fr;
      height: 100vh;
      background-color: #fff7ed; 
      color: #0a1e3a;
      font-family: Arial, sans-serif;
      gap: 10px;
    }

    header {
      grid-column: 1 / -1;
      text-align: center;
      font-family: 'Georgia', serif;
      font-size: 30px;
      color: #7C2D12;
      padding: 20px 24px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: bold;
    }

    .left, .right {
      padding: 20px 24px;
    }

    .left {
      background: #FFFFFF;
      border: 1px solid #E5E7EB;
      border-radius: 10px;
      box-shadow: 0 6px 18px rgba(31,41,55,0.06);
      margin: 0 0 20px 20px;
    }

    .right {
      background: #FFFFFF;
      border: 1px solid #E5E7EB;
      border-radius: 10px;
      box-shadow: 0 6px 18px rgba(31,41,55,0.06);
      margin: 0 20px 20px 0;
    }

    h2 {
      color: #7C2D12;
    }

    .recipe_inputs {
      display: flex;
      align-items: center;
      margin-bottom: 12px;
      gap: 12px;
    }

    .recipe_inputs label {
      width: 120px;
      font-weight: bold;
      color: #7C2D12;
    }
    .recipe_inputs input,
    .recipe_inputs textarea {
      flex: 1;
      padding: 10px 10px;
      font-size: 14px;
      border: 1px solid rgba(234, 108, 18, 0.9); 
      border-radius: 6px;
      background: #fff7ed; 
      color: #0a1e3a; 
  
    }
    .recipe_inputs input:focus,
    .recipe_inputs textarea:focus {
      outline: none;
      border-color: rgba(234, 108, 18, 0.9); 
      background: #fff7ed; 
    
    }

    button {
      padding: 10px 14px;
      background-color: #F97316;
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: 600;
    }

    button:hover {
      background-color: #EA580C;
    }
    li {
      margin: 10px 0;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      padding: 12px 16px;
      border: 1px solid rgba(234, 108, 18, 0.9); 
      border-radius: 8px;
      background: #fff7ed; 
    }
    .meta { 
      flex: 1; 
      font-weight: 600; 
      color: #7C2D12; 
      font-size: 15px;
    }
    ul { 
      padding: 0; 
      list-style: none; 
      margin: 0; 
    }

    .delete {
      background: #DC2626;
      color: white;
      border: 0;
      border-radius: 8px;
      padding: 10px 14px;
      font-weight: 700;
    }
    .view {
      background: #2563EB;
      color: white;
      border: 0;
      border-radius: 8px;
      padding: 10px 14px;
      font-weight: 700;
      margin-right: 8px;
    }

    /* Modal styles */
    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      overflow: auto;
      background-color: rgba(0,0,0,0.4);
      align-items: center;
      justify-content: center;
    }
    .modal-content {
      background-color: #fff7ed;
      margin: auto;
      padding: 20px;
      border: 1px solid #E5E7EB;
      border-radius: 10px;
      width: 90%;
      max-width: 700px;
      color: #0a1e3a;
    }
    .modal h3 { margin-top: 0; color: #7C2D12 }

  </style>
</head>
<body>
  <header>Recipe Organizer</header>

  <div class="left">
    <h2>Novi recept</h2>
    <form id="recipeForm">
      <div class="recipe_inputs">
        <label for="name">Naslov:</label>
        <input type="text" id="name" placeholder="" required>
      </div>

      <div class="recipe_inputs">
        <label for="category">Kategorija:</label>
        <input type="text" id="category" placeholder="">
      </div>

      <div class="recipe_inputs">
        <label for="ingredients">Sastojci:</label>
        <textarea id="ingredients" placeholder="" rows="4"></textarea>
      </div>

      <div class="recipe_inputs">
        <label for="description">Izrada:</label>
        <textarea id="description" placeholder="" rows="6"></textarea>
      </div>

      <button type="submit">Dodaj recept</button>
    </form>
  </div>

  <div class="right">
    <h2>Lista recepata</h2>
    <ul id="recipeList"></ul>
  </div>

  <!-- Modal for viewing recipe -->
  <div id="recipeModal" class="modal">
    <div class="modal-content">
      <h3 id="modalTitle">Recept</h3>
      <p><strong>Kategorija:</strong> <span id="modalCategory"></span></p>
      <p><strong>Sastojci:</strong></p>
      <p id="modalIngredients" style="white-space:pre-wrap"></p>
      <p><strong>Izrada:</strong></p>
      <p id="modalDescription" style="white-space:pre-wrap"></p>
      <div style="text-align:right; margin-top:12px;">
        <button id="closeModal">Zatvori</button>
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById('recipeForm');
    const recipeList = document.getElementById('recipeList');
   const API_BASE = window.location.origin;
    
    async function loadRecipes() {
      const response = await fetch(`${API_BASE}/recipes`);
      const data = await response.json();
      recipeList.innerHTML = '';

      data.forEach(recipe => {
        const li = document.createElement('li');

        const meta = document.createElement('div');
        meta.className = 'meta';
        meta.textContent = recipe.name + " (" + recipe.category + ")";

          const viewBtn = document.createElement('button');
          viewBtn.className = 'view';
          viewBtn.textContent = 'Pogledaj';
          viewBtn.addEventListener('click', () => {
            openModal(recipe);
          });

          const delBtn = document.createElement('button');
          delBtn.className = 'delete';
          delBtn.textContent = 'Obriši';
          delBtn.addEventListener('click', async () => {
            await fetch(`${API_BASE}/recipes/${recipe.id}`, { method: 'DELETE' });
            loadRecipes();
          });

          li.appendChild(meta);
          li.appendChild(viewBtn);
          li.appendChild(delBtn);
        recipeList.appendChild(li);
      });
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('name').value;
      const category = document.getElementById('category').value;
      const ingredients = document.getElementById('ingredients').value;
      const description = document.getElementById('description').value;

      await fetch(`${API_BASE}/recipes`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, category, ingredients, description })
      });

      form.reset();
      loadRecipes();
    });

    function openModal(recipe) {
      document.getElementById('modalTitle').textContent = recipe.name;
      document.getElementById('modalCategory').textContent = recipe.category || '-';
      document.getElementById('modalIngredients').textContent = recipe.ingredients || '-';
      document.getElementById('modalDescription').textContent = recipe.description || '-';
      const modal = document.getElementById('recipeModal');
      modal.style.display = 'flex';
    }

    document.getElementById('closeModal').addEventListener('click', () => {
      document.getElementById('recipeModal').style.display = 'none';
    });

    // Close modal when clicking outside content
    document.getElementById('recipeModal').addEventListener('click', (e) => {
      if (e.target === document.getElementById('recipeModal')) {
        document.getElementById('recipeModal').style.display = 'none';
      }
    });

    loadRecipes();
  </script>
</body>
</html>
